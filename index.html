<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deadlock Randomizer</title>

    <style>
        body {
            background: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 50px;
        }

        h1 {
            margin-bottom: 50px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 50px;
            flex-wrap: wrap;
        }

        .section {
            background: #2b2b2b;
            padding: 25px;
            border-radius: 15px;
            width: 250px;
        }

        .section h2 {
            margin-top: 0;
        }

        .result {
            font-size: 28px;
            font-weight: bold;
            margin: 20px 0;
            min-height: 40px;
        }

        button {
            padding: 12px 20px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <h1>Deadlock Randomizer</h1>

    <div class="container">

        <!-- Left -->
        <div class="section">
            <h2>Hero</h2>
            <div class="result" id="heroResult">---</div>
            <button onclick="pickHero()">Pick Hero</button>
        </div>

        <!-- Middle -->
        <div class="section">
            <h2>Build</h2>
            <div class="result" id="buildResult">---</div>
            <button onclick="pickBuild()">Pick Build</button>
        </div>

        <!-- Right -->
        <div class="section">
            <h2>Souls</h2>
            <div class="result" id="soulsResult">---</div>
            <button onclick="pickSouls()">Pick Souls</button>
        </div>

    </div>

    <script>
        function pickBuild() {
            const choices = ["Green", "Spirit", "Gun"];
            document.getElementById("buildResult").textContent =
                choices[Math.floor(Math.random() * choices.length)];
        }

        function pickSouls() {
            const choices = ["800", "1600", "3200", "6400"];
            document.getElementById("soulsResult").textContent =
                choices[Math.floor(Math.random() * choices.length)];
        }

        function pickHero() {
            const heroes = [
                "Abrams",
                "Bebop",
                "Dynamo",
                "Grey Talon",
                "Haze",
                "Infernus",
                "Ivy",
                "Kelvin",
                "Lady Geist",
                "Lash",
                "McGinnis",
                "Mirage",
                "Mo & Krill",
                "Paradox",
                "Pocket",
                "Seven",
                "Shiv",
                "Sinclair",
                "Vindicta",
                "Viscous",
                "Warden",
                "Wraith",
                "Yamato"
            ];

            document.getElementById("heroResult").textContent =
                heroes[Math.floor(Math.random() * heroes.length)];
        }
    </script>

</body>
</html>
