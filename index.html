<!DOCTYPE html>



<html lang="en">



<head>



<meta charset="UTF-8">



<meta name="viewport" content="width=device-width, initial-scale=1.0">



<title>Deadlock Randomizer</title>





<style>

.result{
    font-size:2rem;
    font-weight:bold;
    min-height:60px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:20px 0;
    transition:.1s;
}

.spinning{
    animation:spinFlash .08s linear infinite;
}

@keyframes spinFlash{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}


*{



    margin:0;



    padding:0;



    box-sizing:border-box;



}







body{



    min-height:100vh;



    background:



        radial-gradient(circle at top, #1f2937, #0f172a 70%);



    color:white;



    font-family:'Segoe UI', sans-serif;



    text-align:center;



    padding:40px;



}







h1{



    font-size:4rem;



    margin-bottom:10px;



    color:#4ade80;



    text-shadow:



        0 0 10px #4ade80,



        0 0 20px #4ade80;



}







.subtitle{



    color:#94a3b8;



    margin-bottom:40px;



}







.container{



    display:flex;



    justify-content:center;



    gap:30px;



    flex-wrap:wrap;



}







.section{



    width:300px;



    background:rgba(15,23,42,.9);



    border:1px solid rgba(255,255,255,.1);



    border-radius:20px;



    padding:25px;



    backdrop-filter:blur(8px);



    box-shadow:



        0 0 25px rgba(0,0,0,.4);



}







.hero-card{



    border-top:4px solid #4ade80;



}







.build-card{



    border-top:4px solid #a855f7;



}







.souls-card{



    border-top:4px solid #fb923c;



}







h2{



    margin-bottom:15px;



}







.result{



    font-size:2rem;



    font-weight:bold;



    min-height:60px;



    display:flex;



    align-items:center;



    justify-content:center;



    margin:20px 0;



}







.hero{



    color:#4ade80;



}







.build{



    color:#a855f7;



}







.souls{



    color:#fb923c;



}







button{



    background:#111827;



    color:white;



    border:none;



    border-radius:10px;



    padding:12px 20px;



    cursor:pointer;



    font-size:16px;



    transition:.2s;



}







button:hover{



    transform:scale(1.05);



}







.hero-btn:hover{



    background:#4ade80;



    color:black;



}







.build-btn:hover{



    background:#a855f7;



}







.souls-btn:hover{



    background:#fb923c;



}







.roll-all{



    margin-top:40px;



    background:linear-gradient(



        90deg,



        #4ade80,



        #a855f7,



        #fb923c



    );



    color:white;



    font-size:22px;



    font-weight:bold;



    padding:18px 40px;



    border-radius:15px;



    box-shadow:



        0 0 20px rgba(168,85,247,.5);



}







.roll-all:hover{



    transform:scale(1.08);



}







.footer{



    margin-top:30px;



    color:#64748b;



}



</style>



</head>







<body>







<h1>DEADLOCK RANDOMIZER</h1>



<p class="subtitle">Roll a random hero, build path, and soul goal.</p>







<div class="container">







    <div class="section hero-card">



        <h2>HERO</h2>



        <div class="result hero" id="heroResult">---</div>



        <button class="hero-btn" onclick="pickHero()">Roll Hero</button>



    </div>







    <div class="section build-card">



        <h2>BUILD</h2>



        <div class="result build" id="buildResult">---</div>



        <button class="build-btn" onclick="pickBuild()">Roll Build</button>



    </div>







    <div class="section souls-card">



        <h2>SOUL GOAL</h2>



        <div class="result souls" id="soulsResult">---</div>



        <button class="souls-btn" onclick="pickSouls()">Roll Souls</button>



    </div>







</div>







<button class="roll-all" onclick="rollAll()">



🎲 ROLL EVERYTHING



</button>







<p class="footer">



Deadlock Challenge Generator



</p>







<script>







const heroes=[
"Abrams","Bebop","Dynamo","Grey Talon","Haze","Infernus","Ivy","Kelvin","Lady Geist","Lash","McGinnis","Mirage","Mo & Krill","Paradox","Pocket","Seven","Shiv","Sinclair","Vindicta","Viscous","Warden","Wraith","Yamato"
];

const builds=[
"Green (Vitality)",
"Purple (Spirit)",
"Orange (Gun)"
];

const souls=[
"800",
"1600",
"3200",
"6400"
];

const audioCtx=new(window.AudioContext||window.webkitAudioContext)();

function tickSound(){
const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();
osc.type="square";
osc.frequency.value=700;
osc.connect(gain);
gain.connect(audioCtx.destination);
gain.gain.setValueAtTime(.04,audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+.04);
osc.start();
osc.stop(audioCtx.currentTime+.04);
}

function winSound(){
const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();
osc.type="triangle";
osc.frequency.setValueAtTime(500,audioCtx.currentTime);
osc.frequency.exponentialRampToValueAtTime(1200,audioCtx.currentTime+.18);
osc.connect(gain);
gain.connect(audioCtx.destination);
gain.gain.setValueAtTime(.08,audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+.2);
osc.start();
osc.stop(audioCtx.currentTime+.2);
}

function spinRoll(id,list){

const el=document.getElementById(id);

el.classList.add("spinning");

const interval=setInterval(()=>{
el.textContent=list[Math.floor(Math.random()*list.length)];
tickSound();
},35);

setTimeout(()=>{
clearInterval(interval);
el.textContent=list[Math.floor(Math.random()*list.length)];
el.classList.remove("spinning");
winSound();
},600);

}

function pickHero(){
spinRoll("heroResult",heroes);
}

function pickBuild(){
spinRoll("buildResult",builds);
}

function pickSouls(){
spinRoll("soulsResult",souls);
}

function rollAll(){
pickHero();
setTimeout(()=>pickBuild(),100);
setTimeout(()=>pickSouls(),200);
}






</script>







</body>



</html>
